server.port: 7001
spring.application.name: api-provider

spring.threads.virtual.enabled: true

# Helps testing, should be set to never in production
spring.web.error.include-message: always

management:
  opentelemetry.tracing.export.otlp.endpoint: http://localhost:4318/v1/traces
  tracing.sampling.probability: 1.0
  otlp.metrics.export.enabled: false
  # Skip tracing, if not required
  tracing.export.enabled: false

logging.level:
  root: INFO
  se.magnus: DEBUG